<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>StreamSaver.js 文件保存示例</title>
</head>
<body>
    <h2>StreamSaver.js 文件保存示例</h2>
    <button id="saveBtn">保存文件</button>

    <!-- 引入 StreamSaver.js -->
    <script src="https://cdn.jsdelivr.net/npm/streamsaver@2.0.5/StreamSaver.min.js"></script>
    <script>
        document.getElementById('saveBtn').addEventListener('click', () => {
            // 创建文件写入流
            const fileStream = streamSaver.createWriteStream('hello.txt');

            // 获取可写流的 writer
            const writer = fileStream.getWriter();

            // 创建 TextEncoder 将字符串转换为 Uint8Array
            const encoder = new TextEncoder();

            // 写入内容
            writer.write(encoder.encode('Hello StreamSaver!\n'));
            writer.write(encoder.encode('这是一个演示文件。\n'));
            writer.write(encoder.encode('文件可以包含多行文本和中文字符。\n'));

            // 写入完成，关闭 writer
            writer.close();

            alert('文件保存触发成功，浏览器将提示下载！');
        });
    </script>
</body>
</html>
